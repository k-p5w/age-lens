<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ねんれいレンズ</title>
    <meta name="description" content="ジャネーの法則を視覚化するツール：年齢による体感時間の違いを比較">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <h1>ねんれいレンズ</h1>
        <p class="subtitle">
            年齢というレンズで、時間を見る
        </p>
    </header>

    <main class="container">
        <section class="card" data-section="002">
            <h2>比較設定</h2>
            
            <div class="form-row">
                <label for="currentAge">基準の年齢</label>
                <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
                    <input id="currentAge" type="number" min="1" max="120" value="30">
                    <span class="unit">歳</span>
                </div>
            </div>

            <div class="form-row">
                <label for="targetYear">西暦入力</label>
                <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
                    <input id="targetYear" type="number" min="1900" max="3000" value="2015">
                    <span class="unit">年</span>
                </div>
            </div>

            <div class="divider">または</div>

            <div class="form-row">
                <label for="preset">出来事プリセット</label>
                <select id="preset">
                    <option value="">-- 年を選ぶ --</option>
                    <option value="2025">2025年</option>
                    <option value="2022">2022年 (ChatGPT公開)</option>
                    <option value="2020">2020年 (コロナ流行)</option>
                    <option value="2015">2015年</option>
                    <option value="2010">2010年</option>
                    <option value="2000">2000年 (21世紀直前)</option>
                    <option value="1990">1990年</option>
                </select>
            </div>
        </section>

        <section class="card result-card" data-section="003">
            <h2>比較結果</h2>
            <div id="mainResult">
                <p>設定を変更すると、結果がリアルタイムに表示されます。</p>
            </div>
        </section>

<section class="card" data-section="004">
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <h2>比較対象の年齢</h2>
        <div id="sliderValue" style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">20歳</div>
    </div>
    <input type="range" id="compareAge" min="1" max="120" value="20" style="width: 100%;">
</section>
        <section class="card" data-section="005">
            <h2>年齢別比較一覧</h2>
            <table>
                <thead>
                    <tr>
                        <th>比較年齢</th>
                        <th>その人なら</th>
                    </tr>
                </thead>
                <tbody id="resultTable"></tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>ねんれいレンズ β</p>
        <p>年齢による体感時間を可視化する実験プロジェクト/ジャネーの法則を視覚化するツール<br></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
